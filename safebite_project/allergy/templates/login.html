<!DOCTYPE html>

<html>
<head>
    <title>SafeBite Login</title>

```
<style>
    body{
        margin:0;
        font-family: Arial;
        background: linear-gradient(120deg,#667eea,#764ba2);
    }

    .box{
        width:380px;
        margin:130px auto;
        background:white;
        padding:35px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,.2);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:12px;
        margin-top:15px;
        border-radius:8px;
        border:1px solid #ccc;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:20px;
        background:#ff6b6b;
        border:none;
        color:white;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#e55050;
    }

    .error{
        color:red;
        margin-top:10px;
    }
</style>
```

</head>

<body>

<div class="box">

```
<h2>🔐 SafeBite Login</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

{% if form.errors %}
    <div class="error">Invalid username or password</div>
{% endif %}
```

</div>

</body>
</html>
