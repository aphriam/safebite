<!DOCTYPE html>

<html>
<head>
    <title>SafeBite Register</title>

```
<style>
    body{
        margin:0;
        font-family: Arial;
        background: linear-gradient(120deg,#43cea2,#185a9d);
    }

    .box{
        width:400px;
        margin:100px auto;
        background:white;
        padding:35px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,.2);
        text-align:center;
    }

    h2{ margin-bottom:20px; }

    input{
        width:100%;
        padding:12px;
        margin-top:12px;
        border-radius:8px;
        border:1px solid #ccc;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:18px;
        background:#2ecc71;
        border:none;
        color:white;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{ background:#27ae60; }

    .error{
        color:red;
        margin-top:10px;
    }

    a{
        display:block;
        margin-top:15px;
        text-decoration:none;
    }
</style>
```

</head>

<body>

<div class="box">

```
<h2>📝 SafeBite Register</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email">
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Create Account</button>
</form>

{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<a href="/login/">Already have an account? Login</a>
```

</div>

</body>
</html>
