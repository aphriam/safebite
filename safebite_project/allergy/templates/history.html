<!DOCTYPE html>
<html>
<head>
    <title>Allergy History</title>
</head>
<body>
    <h2>Your Allergy Records</h2>

    {% if records %}
    <table border="1" cellpadding="10">
        <tr>
            <th>Item</th>
            <th>Type</th>
            <th>Symptoms</th>
            <th>Severity</th>
        </tr>

        {% for r in records %}
        <tr>
            <td>{{ r.item_name }}</td>
            <td>{{ r.item_type }}</td>
            <td>{{ r.symptoms }}</td>
            <td>{{ r.severity }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>No allergy history found.</p>
    {% endif %}

    <br>
    <a href="/">Back to Dashboard</a>
</body>
</html>
