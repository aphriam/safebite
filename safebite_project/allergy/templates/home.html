<!DOCTYPE html>
<html>
<head>
    <title>SafeBite Dashboard</title>
    <style>
        body{
            margin:0;
            font-family:Arial;
            background: linear-gradient(120deg,#74ebd5,#ACB6E5);
        }
        .box{
            width:500px;
            margin:100px auto;
            background:white;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }
        h2{ margin-bottom:20px; }
        a{
            display:block;
            padding:12px;
            margin-top:15px;
            background:#3498db;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
        a:hover{ background:#2980b9; }
        .logout{
            background:#e74c3c;
        }
        .logout:hover{
            background:#c0392b;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Welcome {{ request.user.username }} 👋</h2>

    <a href="/add/">➕ Add Allergy Record</a>
    <a href="/check/">🔎 Check Allergy Risk</a>
    <a href="/history/">📋 View Allergy History</a>
    <a href="/logout/" class="logout">🚪 Logout</a>
</div>

</body>
</html>
