<!DOCTYPE html>

<html>
<head>
    <title>Check Allergy Risk</title>

<style>
    body{
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(120deg,#74ebd5,#ACB6E5);
    }

    .box{
        width:420px;
        margin:120px auto;
        background:white;
        padding:35px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
        color:#2c3e50;
    }

    input{
        width:100%;
        padding:12px;
        border-radius:8px;
        border:1px solid #ccc;
        margin-top:15px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:20px;
        background:#ff6b6b;
        border:none;
        color:white;
        font-size:17px;
        border-radius:8px;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:#e55050;
    }

    .note{
        font-size:13px;
        margin-top:12px;
        color:gray;
    }
</style>
</head>

<body>

<div class="box">


<h2>🔎 Check Allergy Risk</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="item" placeholder="Enter food or medicine name" required>
    <button type="submit">Predict Risk</button>
</form>

<div class="note">
    AI will compare with your allergy history
</div>


</div>

</body>
</html>
